<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple LMS - AdminLTE Sign In</title>
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Theme style (AdminLTE Bootstrap 4 CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <style>
        body.login-page {
            background-color: #e9ecef;
        }
        .login-box {
            width: 400px;
        }
    </style>
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="login-logo">
        <a href="#"><b>Simple LMS</b> LTE</a>
    </div>
    <!-- /.login-logo -->
    <div class="card card-outline card-primary shadow-lg">
        <div class="card-body login-card-body">
            <p class="login-box-msg">Masuk untuk memulai sesi belajar Anda</p>

            <div class="mb-3 text-center">
                <span class="text-muted small d-block mb-2">Pilih Akun Demo untuk Uji Coba:</span>
                <div class="btn-group btn-group-sm d-flex" role="group">
                    <button class="btn btn-outline-primary w-100" onclick="quickFill('mhs001')">Siswa (mhs001)</button>
                    <button class="btn btn-outline-success w-100" onclick="quickFill('dosen10')">Dosen (dosen10)</button>
                    <button class="btn btn-outline-warning text-dark w-100" onclick="quickFill('admin')">Admin (admin)</button>
                </div>
            </div>

            <div class="form-group mb-3">
                <label for="username">Username</label>
                <div class="input-group">
                    <input type="text" id="username" class="form-control" placeholder="mhs001" value="mhs001">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-user"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group mb-3">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" value="password123">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <button id="btnLogin" class="btn btn-primary btn-block" onclick="login()">Masuk / Sign In</button>
                </div>
            </div>

            <div class="mt-3 text-center">
                <div id="errorMsg" class="text-danger font-weight-bold" style="display: none;"></div>
            </div>
        </div>
        <!-- /.login-card-body -->
    </div>
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script>
    // Jika token sudah ada di localStorage, langsung redirect ke dashboard
    if (localStorage.getItem("lms_token")) {
        window.location.href = "/";
    }

    async function login() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("btnLogin");
        const errorDiv = document.getElementById("errorMsg");

        btn.disabled = true;
        btn.innerText = "Membuka sesi...";
        errorDiv.style.display = "none";

        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass })
            });
            
            const data = await res.json();
            if (res.ok) {
                // Simpan token JWT, nama user, dan role di localStorage
                localStorage.setItem("lms_token", data.access_token);
                localStorage.setItem("lms_user", user);
                localStorage.setItem("lms_role", data.user.role);
                // Redirect ke dashboard utama
                window.location.href = "/";
            } else {
                errorDiv.innerText = data.message || "Gagal masuk, cek kredensial Anda.";
                errorDiv.style.display = "block";
            }
        } catch (err) {
            errorDiv.innerText = "Terjadi kesalahan jaringan.";
            errorDiv.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.innerText = "Masuk / Sign In";
        }
    }
    function quickFill(user) {
        document.getElementById("username").value = user;
        document.getElementById("password").value = "password123";
    }
</script>
</body>
</html>
